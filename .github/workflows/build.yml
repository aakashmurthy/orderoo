name: Build/Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename Artifacts
        shell: bash
        run: |
          cd release
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            for f in *.exe; do
              [ -f "$f" ] && mv "$f" "Orderoo-Setup.exe" && break
            done
          elif [[ "${{ matrix.platform }}" == "mac" ]]; then
            for f in *.dmg; do
              [ -f "$f" ] && mv "$f" "Orderoo-Setup.dmg" && break
            done
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Orderoo-${{ matrix.platform }}
          path: |
            release/Orderoo-Setup.exe
            release/Orderoo-Setup.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.dmg" \) -exec cp {} release/ \;
          ls -la release/

      - name: Get Public Repo SHA
        id: get_sha
        run: |
          sha=$(gh api repos/BaaBaaBruh/orderoo-releases/commits/main --jq '.sha')
          echo "sha=$sha" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Release to Public Repo
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/*"
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          owner: BaaBaaBruh
          repo: orderoo-releases
          tag: ${{ github.ref_name }}
          commit: ${{ steps.get_sha.outputs.sha }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Downloads
            - **Windows**: Orderoo-Setup.exe
            - **macOS**: Orderoo-Setup.dmg (Universal - Intel & Apple Silicon)
          allowUpdates: true
          replacesArtifacts: true
